[project]
site_name = "nidaqlib"
site_description = "Experiment-facing NI-DAQmx acquisition layer for scientific instrumentation."
site_url = "https://nidaqlib.graysonbellamy.dev/"
repo_url = "https://github.com/GraysonBellamy/nidaqlib"
repo_name = "GraysonBellamy/nidaqlib"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"
nav = [
    { Home = "index.md" },
    { Installation = "installation.md" },
    { Quickstart = [
        { Async = "quickstart-async.md" },
        { Sync = "quickstart-sync.md" },
    ] },
    { Guides = [
        { "Task specs" = "task-specs.md" },
        { Channels = "channels.md" },
        { Timing = "timing.md" },
        { Streaming = "streaming.md" },
        { "Logging and acquisition" = "logging.md" },
        { TDMS = "tdms.md" },
        { Safety = "safety.md" },
        { Testing = "testing.md" },
        { Architecture = "architecture.md" },
        { Troubleshooting = "troubleshooting.md" },
    ] },
    { "API reference" = [
        { Overview = "api/index.md" },
        { "nidaqlib" = "api/nidaqlib.md" },
        { "nidaqlib.tasks" = "api/tasks.md" },
        { "nidaqlib.channels" = "api/channels.md" },
        { "nidaqlib.streaming" = "api/streaming.md" },
        { "nidaqlib.sinks" = "api/sinks.md" },
        { "nidaqlib.manager" = "api/manager.md" },
        { "nidaqlib.sync" = "api/sync.md" },
        { "nidaqlib.system" = "api/system.md" },
        { "nidaqlib.testing" = "api/testing.md" },
        { "nidaqlib.errors" = "api/errors.md" },
        { "nidaqlib.config" = "api/config.md" },
    ] },
    { Design = "design.md" },
]

[project.theme]
variant = "classic"
custom_dir = "overrides"
features = [
    "content.code.copy",
    "content.code.annotate",
    "navigation.instant",
    "navigation.tracking",
    "navigation.sections",
    "navigation.indexes",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
merge_init_into_class = true
separate_signature = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
